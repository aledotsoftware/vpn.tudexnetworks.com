global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# Gateway Principal
frontend main_gateway
    bind *:80
    
    # Permitir que el dashboard lea las estadísticas del cluster localmente
    acl is_stats_api path_beg /stats/json
    use_backend haproxy_stats_api if is_stats_api

    acl is_dashboard path_beg /dashboard
    use_backend dashboard_service if is_dashboard

    acl is_api path_beg /api/v1/
    use_backend headscale_api if is_api

    default_backend mesh_cluster

# Backend para exportar JSON de HAProxy al Dashboard
backend haproxy_stats_api
    mode http
    http-request set-path /stats;json
    server local_stats 127.0.0.1:8404

# Servicio de Dashboard
backend dashboard_service
    mode http
    http-request return status 200 content-type "text/html" file "/etc/headscale/dashboard.html"

# Backend API Headscale
backend headscale_api
    server hs_node 127.0.0.1:8080

# Monitorización Interna
listen stats_internal
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s

# Cluster Mesh (Regiones Dinámicas)
resolvers headscale_dns
    nameserver local 127.0.0.1:53
    hold valid 1s

backend mesh_cluster
    balance roundrobin
    server n1 %[var(txn.subdomain)]-1.vpn.internal:80 check resolvers headscale_dns init-addr none inter 2s
    server n2 %[var(txn.subdomain)]-2.vpn.internal:80 check resolvers headscale_dns init-addr none inter 2s
    server n3 %[var(txn.subdomain)]-3.vpn.internal:80 check resolvers headscale_dns init-addr none inter 2s
