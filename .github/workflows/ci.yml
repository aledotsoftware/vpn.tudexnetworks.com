name: CI Pipeline

"on": [push, pull_request]

jobs:
  test-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies natively
        run: sudo apt-get update && sudo apt-get install -y haproxy shellcheck yamllint mariadb-client jq

      - name: Ensure CI specific HAProxy Mock paths
        run: |
          sudo mkdir -p /etc/headscale/errors
          sudo cp -r config/errors/* /etc/headscale/errors/ || true
          sudo touch /etc/headscale/dashboard.html
          sudo touch /etc/headscale/admin-panel.html
          sudo touch /etc/headscale/domain-map.txt
          sudo touch /etc/headscale/schema.sql

      - name: Run infrastructure tests
        run: bash scripts/test-infra.sh
