services:
  # Base de datos central para simular el cluster
  mysql_cluster:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=headscale
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Gateway (Tu contenedor)
  gateway:
    build: .
    container_name: vpn_gateway_local
    depends_on:
      mysql_cluster:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
    ports:
      - "8081:80"      # Dashboard y Balanceo (Cambiado de 80 a 8081 para Windows)
      - "8080:8080"    # Headscale API
      - "8404:8404"    # Stats de HAProxy
    volumes:
      - ./config:/etc/headscale
      - headscale_data:/var/lib/headscale

volumes:
  headscale_data:
