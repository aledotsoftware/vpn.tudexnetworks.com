services:
  headscale:
    image: headscale/headscale:latest-debug
    container_name: headscale_control
    restart: always
    command: serve -c /etc/headscale/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config:/etc/headscale
      - ./headscale_data:/var/lib/headscale
      - ./headscale_run:/var/run/headscale
