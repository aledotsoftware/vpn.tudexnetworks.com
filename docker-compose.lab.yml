services:
  # --- GATEWAY ALFA (Conectado a DB Externa) ---
  gateway-alfa:
    build: .
    container_name: gateway_alfa
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    ports:
      - "8081:80"
      - "8080:8080"
    volumes:
      - ./config:/etc/headscale
      - headscale_data_alfa:/var/lib/headscale

  # --- GATEWAY BETA (HA Mirror - DB Externa) ---
  gateway-beta:
    build: .
    container_name: gateway_beta
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    ports:
      - "8181:80"
      - "8180:8080"
    volumes:
      - ./config:/etc/headscale
      - headscale_data_beta:/var/lib/headscale

  # --- NODO SATÉLITE 1 ---
  node-01:
    build: ../now.tudexnetworks.com
    container_name: node_01
    depends_on:
      - gateway-alfa
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=local-node-01
      - VPN_SERVER_URL=http://gateway-alfa:8080
      - VPN_AUTH_KEY=${VPN_AUTH_KEY}
    networks:
      - default

  # --- NODO SATÉLITE 2 ---
  node-02:
    build: ../now.tudexnetworks.com
    container_name: node_02
    depends_on:
      - gateway-alfa
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=local-node-02
      - VPN_SERVER_URL=http://gateway-alfa:8080
      - VPN_AUTH_KEY=${VPN_AUTH_KEY}
    networks:
      - default

volumes:
  headscale_data_alfa:
  headscale_data_beta:
