global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# Gateway Principal (Entrada desde Traefik)
frontend main_gateway
    bind *:80
    
    # --- CAPTURA DE SUBDOMINIO ---
    # Capturamos el primer nivel del host (ej: 'now' de 'now.tudexnetworks.com')
    http-request set-var(txn.subdomain) hdr(host),field(1,.)
    
    # --- RUTEO INTERNO ---
    acl is_stats_api path_beg /stats/json
    use_backend haproxy_stats_api if is_stats_api

    acl is_dashboard path_beg /dashboard
    use_backend dashboard_service if is_dashboard

    # Todo lo que no sea Dashboard o API interna va al cluster mesh
    default_backend mesh_cluster

# API HAProxy (Telemetría real)
backend haproxy_stats_api
    mode http
    http-request set-path /stats;json
    server local_stats 127.0.0.1:8404

# Servicio de Dashboard
backend dashboard_service
    mode http
    http-request return status 200 content-type "text/html" file "/etc/headscale/dashboard.html"

# Resolución DNS Mesh (Internal MagicDNS)
resolvers headscale_dns
    nameserver local 127.0.0.1:53
    hold valid 1s

# CLUSTER MESH DINÁMICO
# Rutea a <subdominio>.vpn.internal (MagicDNS de Tailscale)
backend mesh_cluster
    balance roundrobin
    # n1 resuelve por ejemplo a 'now.vpn.internal'
    server mesh_node %[var(txn.subdomain)].vpn.internal:80 check resolvers headscale_dns init-addr none inter 2s

# Monitorización de HAProxy
listen stats_internal
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
