services:
  # Gateway (Tu contenedor) - Conectado a Firebase (sin DB local)
  gateway:
    build:
      context: .
    container_name: vpn_gateway_local
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASS_FILE=/run/secrets/db_pass
      - HEADSCALE_PRIVATE_KEY_FILE=/run/secrets/headscale_private_key
      - HEADSCALE_NOISE_PRIVATE_KEY_FILE=/run/secrets/headscale_noise_private_key
      - ADMIN_PASSWORD_FILE=/run/secrets/admin_password
      - FIREBASE_API_KEY_FILE=/run/secrets/firebase_api_key
    ports:
      - "8081:80"      # Dashboard y Balanceo
      - "8080:8080"    # Headscale API
      - "8404:8404"    # Stats de HAProxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./config:/etc/headscale
      - headscale_data:/var/lib/headscale
    secrets:
      - headscale_private_key
      - headscale_noise_private_key
      - admin_password
      - db_pass
      - firebase_api_key
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  headscale_data:

secrets:
  # Segregated and hardened via Docker Secrets File definitions
  headscale_private_key:
    file: ./secrets/headscale_private_key.txt
  headscale_noise_private_key:
    file: ./secrets/headscale_noise_private_key.txt
  admin_password:
    file: ./secrets/admin_password.txt
  db_pass:
    file: ./secrets/db_pass.txt
  firebase_api_key:
    file: ./secrets/firebase_api_key.txt
