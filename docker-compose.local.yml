services:
  # Gateway (Tu contenedor) - Conectado a Firebase (sin DB local)
  gateway:
    build: .
    container_name: vpn_gateway_local
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
    ports:
      - "8081:80"      # Dashboard y Balanceo
      - "8080:8080"    # Headscale API
      - "8404:8404"    # Stats de HAProxy
    volumes:
      - ./config:/etc/headscale
      - headscale_data:/var/lib/headscale
    secrets:
      - headscale_private_key
      - headscale_noise_private_key
      - admin_password
      - db_pass

volumes:
  headscale_data:

secrets:
  headscale_private_key:
    environment: "HEADSCALE_PRIVATE_KEY"
  headscale_noise_private_key:
    environment: "HEADSCALE_NOISE_PRIVATE_KEY"
  admin_password:
    environment: "ADMIN_PASSWORD"
  db_pass:
    environment: "DB_PASS"
