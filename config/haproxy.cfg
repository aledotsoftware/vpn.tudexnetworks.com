global
    log stdout format raw local0
    maxconn 4096
    # Aumentamos el buffer para permitir servir el dashboard.html que es > 16KB
    tune.bufsize 65536

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-ignore-probes
    option http-server-close
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 50s
    timeout server 50s

    # --- HARDENING: MITIGACIÓN DE SLOWLORIS ---
    # Los timeouts HTTP previenen ataques de denegación de servicio por conexiones lentas
    # cerrando peticiones incompletas que retienen recursos innecesariamente.
    timeout http-request 10s
    timeout http-keep-alive 10s

    # --- HARDENING: PREVENCIÓN DE INFORMATION DISCLOSURE ---
    # Reemplazo de las páginas de error por defecto de HAProxy con respuestas custom
    # en /etc/headscale/errors para no revelar la firma del servidor ante un fallo 4xx/5xx.
    errorfile 400 /etc/headscale/errors/400.http
    errorfile 401 /etc/headscale/errors/401.http
    errorfile 403 /etc/headscale/errors/403.http
    errorfile 404 /etc/headscale/errors/404.http
    errorfile 408 /etc/headscale/errors/408.http
    errorfile 429 /etc/headscale/errors/429.http
    errorfile 500 /etc/headscale/errors/500.http
    errorfile 502 /etc/headscale/errors/502.http
    errorfile 503 /etc/headscale/errors/503.http
    errorfile 504 /etc/headscale/errors/504.http

# Gateway Principal (Entrada desde Traefik)
frontend main_gateway
    bind *:80
    
    # --- HARDENING: PROTECCIÓN CONTRA DOS ---
    # Limitar conexiones y ráfagas anormales por IP (100 peticiones / 10s)
    # Como HAProxy está detrás de Traefik, usamos X-Forwarded-For para el rate limiting real
    stick-table type string len 40 size 100k expire 30s store http_req_rate(10s),http_err_rate(10s),conn_rate(10s),conn_cur
    http-request track-sc0 req.hdr(x-forwarded-for) if { req.hdr(x-forwarded-for) -m found }
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    http-request deny deny_status 429 if { sc_http_err_rate(0) gt 10 }
    http-request deny deny_status 429 if { sc_conn_rate(0) gt 50 }
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 20 }

    # --- HARDENING: HTTP REQUEST SMUGGLING ---
    # Denegar las peticiones con múltiples cabeceras Content-Length para prevenir ataques de
    # contaminación e inyección de peticiones HTTP en la pasarela.
    http-request deny if { req.hdr_cnt(content-length) gt 1 }

    # --- HARDENING: HOST HEADER INJECTION ---
    # Denegar peticiones con múltiples cabeceras Host para prevenir inyección
    # de cabeceras Host, protegiendo el enrutamiento interno basado en subdominios.
    http-request deny if { req.hdr_cnt(host) gt 1 }

    # --- HARDENING: CABECERAS DE SEGURIDAD Y PRIVACIDAD ---
    # Se auditan explícitamente y refuerzan los esquemas de headers:
    # Eliminar cabeceras que delatan la tecnología subyacente de la respuesta HTTP,
    # minimizando la superficie de reconocimiento para ataques automatizados.
    http-response del-header Server
    http-response del-header X-Powered-By

    # HSTS y protecciones generales
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header Content-Security-Policy "default-src 'self' cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "no-referrer-when-downgrade"
    http-response set-header X-Permitted-Cross-Domain-Policies none
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
    http-response set-header Cross-Origin-Opener-Policy "same-origin"
    http-response set-header Cross-Origin-Embedder-Policy "require-corp"
    http-response set-header Cross-Origin-Resource-Policy "same-origin"

    # --- CAPTURA DE SUBDOMINIO ---
    # Capturamos el primer nivel del host (ej: 'now' de 'now.tudexnetworks.com')
    http-request set-var(txn.subdomain) hdr(host),field(1,.)
    
    # --- RUTEO INTERNO ---
    acl is_stats_api path_beg /stats/json
    use_backend haproxy_stats_api if is_stats_api

    acl is_dashboard path_beg /dashboard
    use_backend dashboard_service if is_dashboard

    # Todo lo que no sea Dashboard o API interna va al cluster mesh
    default_backend mesh_cluster

# API HAProxy (Telemetría real)
backend haproxy_stats_api
    mode http
    http-request set-path /stats;json
    server local_stats 127.0.0.1:8404

# Servicio de Dashboard
backend dashboard_service
    mode http
    http-request return status 200 content-type "text/html" file "/etc/headscale/dashboard.html"

# Resolución DNS Mesh (Internal MagicDNS)
resolvers headscale_dns
    nameserver local 127.0.0.1:53
    hold valid 1s

# RESOLUCIÓN DNS DOCKER (Para Lab Local)
resolvers docker_dns
    nameserver local 127.0.0.11:53

# CLUSTER MESH BALANCEADO
# Distribuye el tráfico de forma equitativa entre los nodos disponibles en el laboratorio
backend mesh_cluster
    balance roundrobin
    
    # Nodos del clúster (resolución interna via Docker DNS para el laboratorio)
    server node_01 node-01:80 check resolvers docker_dns inter 2s
    server node_02 node-02:80 check resolvers docker_dns inter 2s

# Monitorización de HAProxy
listen stats_internal
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
