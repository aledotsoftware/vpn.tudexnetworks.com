name: CI Pipeline

"on": [push, pull_request]

jobs:
  test-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies natively
        run: sudo apt-get update && sudo apt-get install -y haproxy shellcheck yamllint

      - name: Ensure CI specific HAProxy Mock paths
        run: |
          sudo mkdir -p /etc/headscale/errors
          sudo cp -r config/errors/* /etc/headscale/errors/ || true
          sudo touch /etc/headscale/dashboard.html

      - name: Run infrastructure tests
        run: bash scripts/test-infra.sh

      - name: Docker Build Test
        run: docker build -t tudex-gateway-test .
