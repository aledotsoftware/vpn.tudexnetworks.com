services:
  # --- SERVIDOR MAESTRO (GATEWAY EDGE) ---
  headscale:
    build:
      context: .
    container_name: tudex_headscale
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - VPN_IP_PREFIX=${VPN_IP_PREFIX:-100.64.0.0/10}
      - VPN_BASE_DOMAIN=${VPN_BASE_DOMAIN:-vpn.internal}
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://headscale:8080}
    ports:
      - "8081:80"         # HAProxy Edge
      - "8080:8080"      # Headscale Control Plane
      - "8404:8404"      # HAProxy Stats
      - "41641:41641/udp"  # WireGuard Port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./config:/etc/headscale
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - headscale_data:/var/lib/headscale
      - headscale_run:/var/run/headscale
    secrets:
      # Segregated and hardened via Docker Secrets
      - headscale_private_key
      - headscale_noise_private_key
      - admin_password
      - db_pass
      - firebase_api_key
    networks:
      - tudex_mesh_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- NODO SATÉLITE 01 (PHP APP) ---
  node-01:
    build:
      context: ./satellite
    container_name: node_01
    restart: always
    security_opt:
      - no-new-privileges:true
    depends_on:
      headscale:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=node-01
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://headscale:8080}
      - VPN_AUTH_KEY_FILE=/run/secrets/ts_authkey
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    secrets:
      # Segregated and hardened via Docker Secrets
      - ts_authkey
    networks:
      - tudex_mesh_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- NODO SATÉLITE 02 (PHP APP) ---
  node-02:
    build:
      context: ./satellite
    container_name: node_02
    restart: always
    security_opt:
      - no-new-privileges:true
    depends_on:
      headscale:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=node-02
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://headscale:8080}
      - VPN_AUTH_KEY_FILE=/run/secrets/ts_authkey
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    secrets:
      # Segregated and hardened via Docker Secrets
      - ts_authkey
    networks:
      - tudex_mesh_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tudex_mesh_net:
    driver: bridge

volumes:
  headscale_data:
  headscale_run:

secrets:
  # Segregated and hardened via Docker Secrets File definitions
  headscale_private_key:
    file: ./secrets/headscale_private_key.txt
  headscale_noise_private_key:
    file: ./secrets/headscale_noise_private_key.txt
  admin_password:
    file: ./secrets/admin_password.txt
  db_pass:
    file: ./secrets/db_pass.txt
  ts_authkey:
    file: ./secrets/ts_authkey.txt
  firebase_api_key:
    file: ./secrets/firebase_api_key.txt
