global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# 1. Definimos los resolutores (MagicDNS de Headscale)
resolvers headscale_dns
    nameserver local 127.0.0.1:53 # Headscale sirve DNS internamente
    hold valid 5s

# 2. Panel de Control (Stats)
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

# 3. Frontend Principal - Auto Balanceo
frontend main_gateway
    bind *:80
    
    # Capturamos el subdominio (ej: 'a' de 'a.tudex.com')
    # Si el Host es 'a.com', el subdominio es 'a'
    http-request set-var(txn.subdomain) hdr(host),field(1,.)

    # Magia: Enviamos al backend dinámico
    # El servidor se resuelve como {subdominio}.vpn.internal
    use_backend dynamic_mesh_backend

# 4. Backend Dinámico Clusterizado
backend dynamic_mesh_backend
    balance roundrobin
    
    # Intentamos balancear entre hasta 3 instancias por cada sitio.
    # Si el sitio es 'a', enviará tráfico a a-1, a-2 y a-3 en la red Mesh.
    # Los que no existan o estén apagados se marcarán como DOWN automáticamente.
    
    server instance-1 %[var(txn.subdomain)]-1.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-2 %[var(txn.subdomain)]-2.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-3 %[var(txn.subdomain)]-3.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-4 %[var(txn.subdomain)]-4.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-5 %[var(txn.subdomain)]-5.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-6 %[var(txn.subdomain)]-6.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-7 %[var(txn.subdomain)]-7.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-8 %[var(txn.subdomain)]-8.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
    server instance-9 %[var(txn.subdomain)]-9.vpn.internal:80 check resolver headscale_dns inter 5s fall 3 rise 2
