<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUDEX MESH CONTROL - Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #1e1b4b;
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --accent: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--panel);
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
        }

        .stat-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .panel {
            background: var(--panel);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .status-tag { padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .status-online { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-offline { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .master-card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(3, 7, 18, 0.5) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .master-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">TUDEX MESH CONTROL</div>
        <div id="connection-status" style="color: var(--success); font-size: 14px;">
            ● Malla Conectada
        </div>
    </div>

    <div class="master-card">
        <div class="master-icon">🛰️</div>
        <div style="flex: 1">
            <div style="font-size: 12px; color: var(--text-dim)">GATEWAY MAESTRO (Controller)</div>
            <div id="master-domain" style="font-size: 18px; font-weight: 600;">vpn.tudexnetworks.com</div>
        </div>
        <div style="text-align: right">
            <div style="font-size: 12px; color: var(--text-dim)">IP DEL CONTROLADOR</div>
            <div id="master-ip" style="font-weight: 600;">172.23.0.3</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Nodos Activos</div>
            <div id="node-count" class="stat-value">...</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Salud del Cluster</div>
            <div class="stat-value" style="color: var(--success)">Excelente</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Uptime</div>
            <div id="uptime" class="stat-value">Booting...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="panel" style="grid-column: 1 / -1">
            <h2>🌐 Nodos de la Red Mesh</h2>
            <table>
                <thead>
                    <tr>
                        <th>Node Name</th>
                        <th>IP Mesh</th>
                        <th>Namespace</th>
                        <th>Estado</th>
                        <th>Visto por última vez</th>
                    </tr>
                </thead>
                <tbody id="node-list">
                    <tr><td colspan="5" style="text-align:center; padding: 30px;">Cargando infraestructura...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_KEY = "F1xjrntEnw.CISb7AjMcGLRSA0sIFPDo7OnmM2fz5x04yUjytPop6w";
        const startTime = Date.now();

        function updateUptime() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(diff / 60);
            const s = diff % 60;
            document.getElementById('uptime').innerText = `${m}m ${s}s`;
        }

        async function fetchNodes() {
            try {
                // En v0.22.3 el endpoint es /machine, no /node
                const res = await fetch('/api/v1/machine', {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                
                if (!res.ok) throw new Error(res.status === 401 ? 'Auth Required' : 'Offline');
                
                const data = await res.json();
                const machines = data.machines || [];
                
                document.getElementById('node-count').innerText = machines.length;
                
                const tbody = document.getElementById('node-list');
                if (machines.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: var(--text-dim)">No hay nodos registrados todavía en la mesh.</td></tr>';
                } else {
                    tbody.innerHTML = machines.map(m => `
                        <tr>
                            <td><b>${m.givenName || m.name}</b></td>
                            <td>${m.ipAddresses[0]}</td>
                            <td>${m.user.name}</td>
                            <td><span class="status-tag ${m.online ? 'status-online' : 'status-offline'}">${m.online ? 'Online' : 'Offline'}</span></td>
                            <td>${new Date(m.lastSeen).toLocaleTimeString()}</td>
                        </tr>
                    `).join('');
                }
                document.getElementById('connection-status').style.color = 'var(--success)';
                document.getElementById('connection-status').innerText = '● Malla Conectada';
            } catch (e) {
                document.getElementById('connection-status').style.color = 'var(--danger)';
                document.getElementById('connection-status').innerText = `● Error: ${e.message}`;
                document.getElementById('node-list').innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--accent)">⚠️ No se pudo conectar con el motor VPN (${e.message})</td></tr>`;
            }
        }

        setInterval(updateUptime, 1000);
        setInterval(fetchNodes, 5000);
        fetchNodes();
    </script>
</body>
</html>
