<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tudex Mesh — Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e17;--surface:rgba(18,22,36,0.85);--surface-hover:rgba(25,30,50,0.9);
  --border:rgba(255,255,255,0.06);--border-hover:rgba(0,212,255,0.3);
  --accent:#00d4ff;--accent2:#7b61ff;--accent-glow:rgba(0,212,255,0.15);
  --success:#00ff88;--danger:#ff4466;--warning:#ffaa00;
  --text:#e0e6ef;--text-dim:#7a8499;--text-muted:#4a5568;
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%,rgba(0,212,255,0.08),transparent 60%),
  radial-gradient(ellipse at 70% 80%,rgba(123,97,255,0.06),transparent 60%),var(--bg)}
.login-card{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);
  border-radius:16px;padding:48px;width:380px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.login-card h1{font-size:1.5rem;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card p{color:var(--text-dim);font-size:0.85rem;margin-bottom:32px}
.login-card input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:1rem;outline:none;
  transition:border-color .2s}
.login-card input:focus{border-color:var(--accent)}
.login-card input::placeholder{color:var(--text-muted)}
.login-card .error{color:var(--danger);font-size:0.8rem;margin-top:8px;min-height:20px}
.btn-primary{width:100%;padding:14px;margin-top:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:var(--radius-sm);color:#fff;font-size:1rem;font-weight:600;
  cursor:pointer;transition:transform .15s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,255,0.25)}

/* Main Panel */
#main-panel{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;
  background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px)}
.topbar h1{font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar .status{font-size:0.75rem;color:var(--success);display:flex;align-items:center;gap:6px}
.topbar .status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success);
  box-shadow:0 0 8px var(--success)}
.btn-logout{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-dim);padding:6px 14px;cursor:pointer;font-size:0.8rem;transition:all .2s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

.tabs{display:flex;gap:4px;padding:16px 32px 0;background:rgba(10,10,26,0.5)}
.tab-btn{padding:10px 24px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);cursor:pointer;font-size:0.9rem;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}

.content{padding:24px 32px;max-width:1400px;margin:0 auto}

/* Stats bar */
.stats-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;text-align:center}
.stat-card .value{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:0.75rem;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/* Node Cards */
.nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.node-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;transition:all .25s}
.node-card:hover{border-color:var(--border-hover);transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.node-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.node-name{font-weight:600;font-size:1rem}
.node-status{font-size:0.7rem;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.node-status.online{background:rgba(0,255,136,0.1);color:var(--success);border:1px solid rgba(0,255,136,0.2)}
.node-status.offline{background:rgba(255,68,102,0.1);color:var(--danger);border:1px solid rgba(255,68,102,0.2)}
.node-info{display:flex;flex-direction:column;gap:6px}
.node-info-row{display:flex;justify-content:space-between;font-size:0.8rem}
.node-info-row .lbl{color:var(--text-dim)}
.node-info-row .val{color:var(--text);font-family:monospace;font-size:0.8rem}
.node-domains{margin-top:12px;display:flex;flex-wrap:wrap;gap:4px}
.domain-pill{font-size:0.7rem;padding:2px 8px;border-radius:12px;background:var(--accent-glow);
  color:var(--accent);border:1px solid rgba(0,212,255,0.15)}

/* Domains */
.domains-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.domains-header h2{font-size:1.2rem;font-weight:600}
.btn-add{display:flex;align-items:center;gap:8px;padding:10px 20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  border-radius:var(--radius-sm);color:#fff;font-weight:600;cursor:pointer;
  font-size:0.85rem;transition:all .2s}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,255,0.3)}

.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;margin-bottom:16px;transition:all .25s}
.domain-card:hover{border-color:var(--border-hover)}
.domain-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.domain-name{font-size:1.15rem;font-weight:700;font-family:monospace}
.domain-actions{display:flex;gap:8px;align-items:center}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:12px;transition:.3s}
.toggle .slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(20px)}
.btn-delete{background:none;border:1px solid rgba(255,68,102,0.3);color:var(--danger);
  padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.8rem;transition:all .2s}
.btn-delete:hover{background:rgba(255,68,102,0.1)}

.assigned-nodes{margin-top:8px}
.assigned-nodes h4{font-size:0.8rem;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.assigned-list{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.assigned-node{display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);
  border-radius:20px;font-size:0.82rem}
.assigned-node .remove{background:none;border:none;color:var(--danger);cursor:pointer;
  font-size:1rem;line-height:1;padding:0 2px;opacity:0.6;transition:opacity .2s}
.assigned-node .remove:hover{opacity:1}
.btn-assign{display:flex;align-items:center;gap:4px;padding:6px 14px;background:rgba(255,255,255,0.04);
  border:1px dashed var(--border);border-radius:20px;color:var(--text-dim);cursor:pointer;
  font-size:0.82rem;transition:all .2s}
.btn-assign:hover{border-color:var(--accent);color:var(--accent)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:32px;width:420px;backdrop-filter:blur(20px)}
.modal h3{font-size:1.1rem;margin-bottom:20px}
.modal input,.modal select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);
  font-size:0.9rem;outline:none;margin-bottom:12px;transition:border-color .2s}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal select option{background:var(--bg);color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn-cancel{padding:10px 20px;background:none;border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;font-size:0.85rem}
.btn-cancel:hover{border-color:var(--text)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;
  color:var(--text-dim);font-size:0.9rem}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty .icon{font-size:3rem;margin-bottom:16px;opacity:0.3}
.empty p{font-size:0.9rem}

/* Toast notification */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:var(--radius-sm);
  color:#fff;font-size:0.85rem;z-index:300;transform:translateY(100px);opacity:0;
  transition:all .3s ease;font-weight:500}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.3);color:var(--success)}
.toast.error{background:rgba(255,68,102,0.15);border:1px solid rgba(255,68,102,0.3);color:var(--danger)}

@media(max-width:768px){
  .content{padding:16px}
  .topbar{padding:12px 16px}
  .tabs{padding:12px 16px 0}
  .nodes-grid{grid-template-columns:1fr}
  .stat-card{min-width:120px}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <h1>🌐 TUDEX MESH</h1>
    <p>Admin Panel — Control de Infraestructura</p>
    <input type="password" id="password-input" placeholder="Contraseña de acceso" autofocus>
    <div class="error" id="login-error"></div>
    <button class="btn-primary" onclick="attemptLogin()">Ingresar</button>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="main-panel">
  <div class="topbar">
    <h1>🌐 TUDEX MESH — ADMIN</h1>
    <div class="topbar-right">
      <span class="status" id="fb-status">Firebase Conectado</span>
      <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('nodes')">Nodos</button>
    <button class="tab-btn" onclick="switchTab('domains')">Dominios</button>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card"><div class="value" id="stat-total">—</div><div class="label">Total Nodos</div></div>
      <div class="stat-card"><div class="value" id="stat-online">—</div><div class="label">Online</div></div>
      <div class="stat-card"><div class="value" id="stat-offline">—</div><div class="label">Offline</div></div>
      <div class="stat-card"><div class="value" id="stat-domains">—</div><div class="label">Dominios</div></div>
    </div>

    <!-- NODES TAB -->
    <div id="nodes-tab">
      <div class="loading" id="nodes-loading"><div class="spinner"></div>Cargando nodos...</div>
      <div class="nodes-grid" id="nodes-grid"></div>
    </div>

    <!-- DOMAINS TAB -->
    <div id="domains-tab" style="display:none">
      <div class="domains-header">
        <h2>Dominios Configurados</h2>
        <button class="btn-add" onclick="showAddDomainModal()">+ Agregar Dominio</button>
      </div>
      <div id="domains-list"></div>
    </div>
  </div>
</div>

<!-- ADD DOMAIN MODAL -->
<div class="modal-overlay" id="add-domain-modal">
  <div class="modal">
    <h3>Agregar Dominio</h3>
    <input type="text" id="new-domain-input" placeholder="ejemplo.com">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="addDomain()">Agregar</button>
    </div>
  </div>
</div>

<!-- ASSIGN NODE MODAL -->
<div class="modal-overlay" id="assign-node-modal">
  <div class="modal">
    <h3>Asignar Nodo a <span id="assign-domain-name"></span></h3>
    <select id="node-select"><option value="">Seleccionar nodo...</option></select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="confirmAssignNode()">Asignar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const FIREBASE_URL = '%%FIREBASE_DB_URL%%';
const ADMIN_PASSWORD = '%%ADMIN_PASSWORD%%';

let apiKey = '';
let nodes = [];
let domainMappings = {};
let currentAssignDomainKey = '';
let refreshInterval = null;

// ======================== AUTH ========================
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

function attemptLogin() {
  const pw = document.getElementById('password-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('mesh_auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-panel').style.display = 'block';
    loadAllData();
    refreshInterval = setInterval(loadAllData, 30000);
  } else {
    document.getElementById('login-error').textContent = 'Contraseña incorrecta';
    document.getElementById('password-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('mesh_auth');
  clearInterval(refreshInterval);
  location.reload();
}

// Auto-login if session exists
if (sessionStorage.getItem('mesh_auth') === 'true') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-panel').style.display = 'block';
  loadAllData();
  refreshInterval = setInterval(loadAllData, 30000);
}

// ======================== DATA ========================
async function loadAllData() {
  try {
    // Get API key from Firebase
    const keyResp = await fetch(FIREBASE_URL + '/headscale_secrets/api_key/key_content.json');
    const keyData = await keyResp.json();
    if (keyData && keyData !== 'null') apiKey = keyData;

    await Promise.all([loadNodes(), loadDomainMappings()]);
    updateStats();
    document.getElementById('fb-status').textContent = 'Firebase Conectado';
  } catch (err) {
    console.error('Error loading data:', err);
    document.getElementById('fb-status').textContent = 'Error de conexión';
    document.getElementById('fb-status').style.color = 'var(--danger)';
  }
}

async function loadNodes() {
  try {
    const resp = await fetch('/api/v1/machine', {
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    nodes = data.machines || data.nodes || [];
    renderNodes();
  } catch (err) {
    console.error('Error loading nodes:', err);
    // Try with /api/v1/node (newer Headscale versions)
    try {
      const resp2 = await fetch('/api/v1/node', {
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      if (resp2.ok) {
        const data2 = await resp2.json();
        nodes = data2.nodes || data2.machines || [];
        renderNodes();
      }
    } catch (e) { /* silently fail */ }
  }
  document.getElementById('nodes-loading').style.display = 'none';
}

async function loadDomainMappings() {
  const resp = await fetch(FIREBASE_URL + '/domain_mappings.json');
  const data = await resp.json();
  domainMappings = data || {};
  renderDomains();
}

function updateStats() {
  const online = nodes.filter(n => n.online).length;
  const domainCount = Object.keys(domainMappings).length;
  document.getElementById('stat-total').textContent = nodes.length;
  document.getElementById('stat-online').textContent = online;
  document.getElementById('stat-offline').textContent = nodes.length - online;
  document.getElementById('stat-domains').textContent = domainCount;
}

// ======================== RENDER ========================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('nodes-tab').style.display = tab === 'nodes' ? 'block' : 'none';
  document.getElementById('domains-tab').style.display = tab === 'domains' ? 'block' : 'none';
}

function getNodeDomains(nodeName) {
  const domains = [];
  for (const [key, mapping] of Object.entries(domainMappings)) {
    const mnodes = mapping.nodes || [];
    if (Array.isArray(mnodes) ? mnodes.includes(nodeName) : mnodes[nodeName]) {
      domains.push(mapping.domain);
    }
  }
  return domains;
}

function timeAgo(dateStr) {
  if (!dateStr) return 'N/A';
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

function renderNodes() {
  const grid = document.getElementById('nodes-grid');
  if (nodes.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">📡</div><p>No hay nodos registrados en Headscale</p></div>';
    return;
  }
  grid.innerHTML = nodes.map(node => {
    const name = node.givenName || node.name || 'unknown';
    const ips = (node.ipAddresses || []).join(', ') || 'N/A';
    const online = node.online;
    const lastSeen = node.lastSeen;
    const assignedDomains = getNodeDomains(name);
    return `
      <div class="node-card">
        <div class="node-header">
          <span class="node-name">${escHtml(name)}</span>
          <span class="node-status ${online ? 'online' : 'offline'}">${online ? 'Online' : 'Offline'}</span>
        </div>
        <div class="node-info">
          <div class="node-info-row"><span class="lbl">IP</span><span class="val">${escHtml(ips)}</span></div>
          <div class="node-info-row"><span class="lbl">Última vez</span><span class="val">${timeAgo(lastSeen)}</span></div>
          <div class="node-info-row"><span class="lbl">ID</span><span class="val">#${node.id || '?'}</span></div>
        </div>
        ${assignedDomains.length > 0 ? `
          <div class="node-domains">
            ${assignedDomains.map(d => `<span class="domain-pill">${escHtml(d)}</span>`).join('')}
          </div>
        ` : ''}
      </div>`;
  }).join('');
}

function renderDomains() {
  const list = document.getElementById('domains-list');
  const entries = Object.entries(domainMappings);

  if (entries.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">🌍</div><p>No hay dominios configurados.<br>Agrega uno con el botón de arriba.</p></div>';
    return;
  }

  list.innerHTML = entries.map(([key, mapping]) => {
    const nodesList = mapping.nodes || [];
    const nodesArr = Array.isArray(nodesList) ? nodesList : Object.keys(nodesList);
    const enabled = mapping.enabled !== false;
    return `
      <div class="domain-card" style="${enabled ? '' : 'opacity:0.5'}">
        <div class="domain-card-header">
          <span class="domain-name">${escHtml(mapping.domain)}</span>
          <div class="domain-actions">
            <label class="toggle" title="${enabled ? 'Desactivar' : 'Activar'}">
              <input type="checkbox" ${enabled ? 'checked' : ''} onchange="toggleDomain('${key}')">
              <span class="slider"></span>
            </label>
            <button class="btn-delete" onclick="deleteDomain('${key}','${escHtml(mapping.domain)}')">Eliminar</button>
          </div>
        </div>
        <div class="assigned-nodes">
          <h4>Nodos asignados (${nodesArr.length})</h4>
          <div class="assigned-list">
            ${nodesArr.map(n => `
              <span class="assigned-node">
                ${escHtml(n)}
                <button class="remove" onclick="unassignNode('${key}','${n}')" title="Quitar nodo">×</button>
              </span>
            `).join('')}
            <button class="btn-assign" onclick="showAssignModal('${key}','${escHtml(mapping.domain)}')">+ Nodo</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ======================== DOMAIN ACTIONS ========================
function showAddDomainModal() {
  document.getElementById('add-domain-modal').classList.add('show');
  document.getElementById('new-domain-input').value = '';
  document.getElementById('new-domain-input').focus();
}

async function addDomain() {
  const domain = document.getElementById('new-domain-input').value.trim().toLowerCase();
  if (!domain || !domain.includes('.')) {
    toast('Ingresa un dominio válido (ej: mitienda.com)', 'error');
    return;
  }
  const key = domain.replace(/\./g, '_').replace(/[^a-z0-9_-]/g, '');
  try {
    await fetch(FIREBASE_URL + '/domain_mappings/' + key + '.json', {
      method: 'PUT',
      body: JSON.stringify({
        domain: domain,
        nodes: [],
        enabled: true,
        created_at: new Date().toISOString()
      })
    });
    closeModal();
    await loadDomainMappings();
    updateStats();
    toast('Dominio ' + domain + ' agregado', 'success');
  } catch (err) {
    toast('Error al agregar dominio', 'error');
  }
}

async function deleteDomain(key, domain) {
  if (!confirm('¿Eliminar el dominio ' + domain + '? Esta acción no se puede deshacer.')) return;
  try {
    await fetch(FIREBASE_URL + '/domain_mappings/' + key + '.json', { method: 'DELETE' });
    await loadDomainMappings();
    updateStats();
    toast('Dominio ' + domain + ' eliminado', 'success');
  } catch (err) {
    toast('Error al eliminar', 'error');
  }
}

async function toggleDomain(key) {
  const mapping = domainMappings[key];
  const newState = mapping.enabled === false ? true : false;
  try {
    await fetch(FIREBASE_URL + '/domain_mappings/' + key + '/enabled.json', {
      method: 'PUT',
      body: JSON.stringify(newState)
    });
    await loadDomainMappings();
    toast('Dominio ' + (newState ? 'activado' : 'desactivado'), 'success');
  } catch (err) {
    toast('Error al cambiar estado', 'error');
  }
}

// ======================== NODE ASSIGNMENT ========================
function showAssignModal(domainKey, domainName) {
  currentAssignDomainKey = domainKey;
  document.getElementById('assign-domain-name').textContent = domainName;
  const select = document.getElementById('node-select');
  const mapping = domainMappings[domainKey];
  const assigned = mapping.nodes || [];
  const assignedArr = Array.isArray(assigned) ? assigned : Object.keys(assigned);

  // Filter out already-assigned nodes and the gateway
  const available = nodes.filter(n => {
    const name = n.givenName || n.name;
    return !assignedArr.includes(name) && !name.startsWith('master-gateway');
  });

  select.innerHTML = '<option value="">Seleccionar nodo...</option>' +
    available.map(n => {
      const name = n.givenName || n.name;
      const status = n.online ? '🟢' : '🔴';
      return `<option value="${escHtml(name)}">${status} ${escHtml(name)}</option>`;
    }).join('');

  document.getElementById('assign-node-modal').classList.add('show');
}

async function confirmAssignNode() {
  const nodeName = document.getElementById('node-select').value;
  if (!nodeName) { toast('Selecciona un nodo', 'error'); return; }

  const mapping = domainMappings[currentAssignDomainKey];
  let nodesList = mapping.nodes || [];
  if (!Array.isArray(nodesList)) nodesList = Object.keys(nodesList);
  nodesList.push(nodeName);

  try {
    await fetch(FIREBASE_URL + '/domain_mappings/' + currentAssignDomainKey + '/nodes.json', {
      method: 'PUT',
      body: JSON.stringify(nodesList)
    });
    closeModal();
    await loadDomainMappings();
    renderNodes(); // re-render to show domain pills
    toast(nodeName + ' asignado exitosamente', 'success');
  } catch (err) {
    toast('Error al asignar nodo', 'error');
  }
}

async function unassignNode(domainKey, nodeName) {
  const mapping = domainMappings[domainKey];
  let nodesList = mapping.nodes || [];
  if (!Array.isArray(nodesList)) nodesList = Object.keys(nodesList);
  nodesList = nodesList.filter(n => n !== nodeName);

  try {
    await fetch(FIREBASE_URL + '/domain_mappings/' + domainKey + '/nodes.json', {
      method: 'PUT',
      body: JSON.stringify(nodesList)
    });
    await loadDomainMappings();
    renderNodes();
    toast(nodeName + ' removido del dominio', 'success');
  } catch (err) {
    toast('Error al quitar nodo', 'error');
  }
}

// ======================== UTILS ========================
function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(); });
});

// Enter key for domain input
document.getElementById('new-domain-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addDomain();
});
</script>
