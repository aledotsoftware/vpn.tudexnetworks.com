global
    log stdout format raw local0
    maxconn 4096
    tune.bufsize 65536

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-ignore-probes
    option http-server-close
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-request 5s
    timeout http-keep-alive 10s
    timeout queue 10s
    timeout tarpit 5s

    errorfile 400 /etc/headscale/errors/400.http
    errorfile 401 /etc/headscale/errors/401.http
    errorfile 403 /etc/headscale/errors/403.http
    errorfile 404 /etc/headscale/errors/404.http
    errorfile 405 /etc/headscale/errors/405.http
    errorfile 408 /etc/headscale/errors/408.http
    errorfile 429 /etc/headscale/errors/429.http
    errorfile 500 /etc/headscale/errors/500.http
    errorfile 502 /etc/headscale/errors/502.http
    errorfile 503 /etc/headscale/errors/503.http
    errorfile 504 /etc/headscale/errors/504.http
    errorfile 413 /etc/headscale/errors/413.http

# Gateway Principal
frontend main_gateway
    bind *:80
    
    # --- HARDENING: PROTECCIÓN CONTRA DOS ---
    # Limitar conexiones y ráfagas anormales por IP (100 peticiones / 10s)
    # Como HAProxy está detrás de Traefik, usamos X-Forwarded-For para el rate limiting real
    # --- HARDENING ---
    stick-table type string len 40 size 100k expire 30s store http_req_rate(10s),http_err_rate(10s),conn_rate(10s),conn_cur
    http-request track-sc0 req.hdr(x-forwarded-for) if { req.hdr(x-forwarded-for) -m found }
    http-request track-sc0 src if ! { req.hdr(x-forwarded-for) -m found }

    # Bloquear abuso de concurrencia y conexiones rápidas (anti-bots, DoS masivo)
    http-request deny deny_status 414 errorfile /etc/headscale/errors/414.http if { url_len gt 2048 }
    http-request deny deny_status 413 errorfile /etc/headscale/errors/413.http if { req.hdr(content-length) -m int gt 10485760 }
    http-request tarpit deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_http_req_rate(0) gt 200 }
    http-request tarpit deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_http_req_rate(0) gt 150 }
    http-request deny deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_http_req_rate(0) gt 100 }
    http-request tarpit deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_http_err_rate(0) gt 15 }
    http-request deny deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_http_err_rate(0) gt 10 }
    http-request tarpit deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_conn_rate(0) gt 75 }
    http-request deny deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_conn_rate(0) gt 50 }
    http-request tarpit deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_conn_cur(0) gt 30 }
    http-request deny deny_status 429 errorfile /etc/headscale/errors/429.http if { sc_conn_cur(0) gt 20 }
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr_cnt(content-length) gt 1 }
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr_cnt(host) gt 1 }
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr_cnt(transfer-encoding) gt 1 }
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr_cnt(host) eq 0 }
    http-request deny deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr(transfer-encoding) -m found } { req.hdr(content-length) -m found }
    http-request deny deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr(transfer-encoding) -m sub chunked } { req.ver 1.0 }
    acl is_sensitive_path path_reg -i ^/(.*/)?\.env|^(.*/)?\.git|^(.*/)?\.aws|^(.*/)?\.ssh|^(.*/)?\.ht|^(.*/)?\.svn|^(.*/)?\.DS_Store|^(.*/)?\.bak|^(.*/)?\.sql|^(.*/)?\.log|^(.*/)?\.conf|^(.*/)?\.ini|^(.*/)?\.yaml|^(.*/)?\.yml
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_sensitive_path
    acl is_unsafe_method method TRACE CONNECT TRACK PROPFIND DEBUG
    http-request deny deny_status 405 errorfile /etc/headscale/errors/405.http if is_unsafe_method
    acl is_valid_method method GET POST PUT DELETE OPTIONS HEAD PATCH
    http-request deny deny_status 405 errorfile /etc/headscale/errors/405.http if ! is_valid_method

    # Rechazar contenido inaceptable
    http-request deny deny_status 406 errorfile /etc/headscale/errors/406.http if { req.hdr(accept) -i application/x-executable }

    # Bloquear path traversal y bots sin User-Agent
    acl is_path_traversal path_reg -i \.\./|\/etc\/passwd|\/etc\/shadow|\/Windows\/win\.ini
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_path_traversal
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr_cnt(user-agent) eq 0 }

    # Bloquear User-Agents excesivamente cortos (posibles escáneres/bots)
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if { req.hdr(user-agent),length lt 5 }

    # Bloquear Null Bytes
    acl is_null_byte url_reg %00
    http-request tarpit deny_status 400 errorfile /etc/headscale/errors/400.http if is_null_byte

    # Bloquear escáneres conocidos
    acl is_scanner req.hdr(user-agent) -m reg -i (nmap|nikto|sqlmap|masscan|zgrab|nessus|dirbuster|gobuster|wpscan|shodan|nuclei|zmap|httpx|hydra|medusa|acunetix|appscan|ncrack|openvas|skipfish|w3af|arachni|grabber|cgichk|sqlbrute|whatweb|havij|netsparker|censys|projectdiscovery|burpsuite|postman|wfuzz|amass|dirb|feroxbuster|chisel|ncat|httprobe|subfinder|zgrab2|tsunami|ffuf|dalfox|blackwidow|crawl|httrack|scrapy|vulnscanner|badbot)
    acl is_php_scanner path_reg -i \.php$
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_scanner
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_php_scanner

    # Bloqueo heurístico de XSS
    acl is_xss url_reg -i (%3C|<)script(%3E|>)|javascript:|onmouseover=|onerror=|onload=
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_xss

    # Bloqueo básico de SQL Injection
    acl is_sqli url_reg -i (%27)|(--)|(%23)|(%3B).*?(UNION|SELECT|INSERT|UPDATE|DELETE|DROP|EXEC|CAST|CONVERT|DECLARE)
    http-request tarpit deny_status 403 errorfile /etc/headscale/errors/403.http if is_sqli

    # --- SECURITY HEADERS ---
    http-response del-header Server
    # CSP consolidated below
    http-response del-header X-Powered-By
    http-response set-header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive"
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-DNS-Prefetch-Control "off"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-downgrade"
    http-response set-header X-Permitted-Cross-Domain-Policies none
    http-response set-header X-Download-Options noopen
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    http-response set-header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' %%FIREBASE_DOMAIN%%; object-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests; worker-src 'none'; media-src 'none'; manifest-src 'none'; child-src 'none';"
    http-response set-header Cross-Origin-Opener-Policy "same-origin"
    http-response set-header Cross-Origin-Embedder-Policy "require-corp"
    http-response set-header Cross-Origin-Resource-Policy "same-origin"
    http-response set-header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate"
    http-response set-header Pragma "no-cache"
    http-response set-header Expires "0"

    # --- HOST CAPTURE & DYNAMIC ROUTING ---
    http-request set-var(txn.host) hdr(host),lower,field(1,:)
    http-request set-var(txn.backend) hdr(host),lower,field(1,:),map(/etc/headscale/domain-map.txt)

    # --- 1. ADMIN PANEL (mesh.tudexnetworks.com o /admin) ---
    acl is_admin_domain hdr_beg(host) -i mesh.tudexnetworks.com
    acl is_admin_path path_beg /admin
    acl is_headscale_api path_beg /api/

    # API proxy (global — funciona desde cualquier dominio)
    use_backend headscale_api_proxy if is_headscale_api

    # Admin panel HTML
    use_backend admin_panel_service if is_admin_domain
    use_backend admin_panel_service if is_admin_path

    # --- 2. RUTAS INTERNAS (vpn.tudexnetworks.com) ---
    acl is_stats_api path_beg /stats/json
    use_backend haproxy_stats_api if is_stats_api

    acl is_dashboard path_beg /dashboard
    use_backend dashboard_service if is_dashboard

    # --- 3. RUTEO POR DOMINIO (MAP FILE DINÁMICO) ---
    use_backend %[var(txn.backend)] if { var(txn.backend) -m found }


    # --- 4. FALLBACK ---
    default_backend mesh_cluster

# Proxy a Headscale API (para admin panel)
backend headscale_api_proxy
    mode http
    server headscale 127.0.0.1:8080

# Admin Panel
backend admin_panel_service
    mode http
    http-request return status 200 content-type "text/html" file "/etc/headscale/admin-panel.html"

# API HAProxy (Telemetría)
backend haproxy_stats_api
    mode http
    http-request set-path /stats;json
    server local_stats 127.0.0.1:8404

# Dashboard NOC
backend dashboard_service
    mode http
    http-request return status 200 content-type "text/html" file "/etc/headscale/dashboard.html"

# DNS Resolvers
resolvers headscale_dns
    nameserver local 127.0.0.1:53
    hold valid 1s

resolvers docker_dns
    nameserver local 127.0.0.11:53

# CLUSTER MESH GENÉRICO (Fallback)
backend mesh_cluster
    balance roundrobin
    server node_01 node-01:80 check resolvers docker_dns inter 2s
    server node_02 node-02:80 check resolvers docker_dns inter 2s

# HAProxy Stats
listen stats_internal
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s

# __DYNAMIC_BACKENDS_START__
