name: CI Infrastructure Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck entrypoint
        run: shellcheck config/entrypoint.sh

      - name: Validate HAProxy Config
        # Using haproxy alpine image directly to validate the config file
        run: |
          # Create placeholder for dashboard.html that haproxy checks
          mkdir -p /tmp/etc/headscale
          touch /tmp/etc/headscale/dashboard.html
          docker run --rm -v $(pwd)/config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro -v /tmp/etc/headscale/dashboard.html:/etc/headscale/dashboard.html:ro haproxy:alpine haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Docker Build Test
        run: docker build -t tudex-gateway-test .
