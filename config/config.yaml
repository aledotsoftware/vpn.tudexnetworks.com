# ============================================================
# TUDEX NETWORKS - CONFIGURACIÓN CORE DE HEADSCALE
# ============================================================

server_url: http://gateway_beta:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090

# --- BASE DE DATOS (Mantenemos SQLite interna para estados locales) ---
# La sincronización de identidad se maneja por el entrypoint.
db_type: sqlite3
db_path: /var/lib/headscale/db.sqlite

# --- RED PRIVADA (MESH) ---
ip_prefixes:
  - 100.65.0.0/16

# --- DNS & MAGICDNS ---
dns_config:
  magic_dns: true
  base_domain: vpn.internal
  nameservers:
    - 1.1.1.1

# --- SECRETOS (Rutas persistentes) ---
private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# --- ACCESOS Y POLÍTICAS DE SEGURIDAD (ACL) ---
acl_policy_path: /etc/headscale/acl.hujson

# --- LOGGING ---
log:
  level: info

node_update_check_interval: 10s
