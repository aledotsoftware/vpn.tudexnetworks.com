services:
  # --- GATEWAY ALFA (Conectado a Firebase) ---
  gateway-alfa:
    build:
      context: .
    container_name: gateway_alfa
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - VPN_IP_PREFIX=${VPN_IP_PREFIX_ALFA}
      - VPN_BASE_DOMAIN=${VPN_BASE_DOMAIN}
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://gateway_alfa:8080}
    ports:
      - "8081:80"
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./config:/etc/headscale
      - headscale_data_alfa:/var/lib/headscale
    secrets:
      - headscale_private_key
      - headscale_noise_private_key
      - admin_password
      - db_pass
      - firebase_api_key

  # --- GATEWAY BETA (HA Mirror - Firebase) ---
  gateway-beta:
    build:
      context: .
    container_name: gateway_beta
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DB_TYPE=${DB_TYPE}
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - VPN_IP_PREFIX=${VPN_IP_PREFIX_BETA}
      - VPN_BASE_DOMAIN=${VPN_BASE_DOMAIN}
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://gateway_beta:8080}
    ports:
      - "8181:80"
      - "8180:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./config:/etc/headscale
      - headscale_data_beta:/var/lib/headscale
    secrets:
      - headscale_private_key
      - headscale_noise_private_key
      - admin_password
      - db_pass
      - firebase_api_key

  # --- NODO SATÉLITE 1 ---
  node-01:
    build:
      context: ../now.tudexnetworks.com
    container_name: node_01
    security_opt:
      - no-new-privileges:true
    depends_on:
      - gateway-alfa
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=local-node-01
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://gateway_alfa:8080}
      - VPN_AUTH_KEY_FILE=/run/secrets/ts_authkey
    secrets:
      - ts_authkey
    networks:
      - default

  # --- NODO SATÉLITE 2 ---
  node-02:
    build:
      context: ../now.tudexnetworks.com
    container_name: node_02
    security_opt:
      - no-new-privileges:true
    depends_on:
      - gateway-alfa
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NODE_NAME=local-node-02
      - VPN_SERVER_URL=${VPN_SERVER_URL:-http://gateway_alfa:8080}
      - VPN_AUTH_KEY_FILE=/run/secrets/ts_authkey
    secrets:
      - ts_authkey
    networks:
      - default

volumes:
  headscale_data_alfa:
  headscale_data_beta:

secrets:
  # Segregated and hardened via Docker Secrets File definitions
  headscale_private_key:
    file: ./secrets/headscale_private_key.txt
  headscale_noise_private_key:
    file: ./secrets/headscale_noise_private_key.txt
  admin_password:
    file: ./secrets/admin_password.txt
  db_pass:
    file: ./secrets/db_pass.txt
  ts_authkey:
    file: ./secrets/ts_authkey.txt
  firebase_api_key:
    file: ./secrets/firebase_api_key.txt
