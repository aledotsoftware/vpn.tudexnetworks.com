name: CI Infrastructure Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck entrypoint
        run: shellcheck config/entrypoint.sh

      - name: Validate HAProxy Config
        run: |
          sudo apt-get update
          sudo apt-get install -y haproxy
          sudo mkdir -p /etc/headscale/errors
          sudo cp -r config/errors/* /etc/headscale/errors/ || true
          sudo touch /etc/headscale/dashboard.html
          haproxy -c -f config/haproxy.cfg

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Docker Build Test
        run: docker build -t tudex-gateway-test .
