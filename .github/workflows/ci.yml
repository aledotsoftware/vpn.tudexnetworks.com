name: Tudex Mesh CI/CD

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck haproxy yamllint mariadb-client jq

      - name: Setup HAProxy Mock Environment
        run: |
          sudo mkdir -p /etc/headscale/errors
          sudo cp -r config/errors/* /etc/headscale/errors/ 2>/dev/null || true
          sudo touch /etc/headscale/dashboard.html /etc/headscale/admin-panel.html /etc/headscale/domain-map.txt /etc/headscale/schema.sql

      - name: Run infrastructure validation tests
        run: |
          chmod +x scripts/test-infra.sh
          ./scripts/test-infra.sh
